<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoolFTC — The #1 FTC Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
:root{
  --bg:#07070A;--bg2:#0C0C12;--bg3:#121219;--surface:#18181F;--surface2:#1F1F28;--surface3:#27272F;
  --border:rgba(255,255,255,0.065);--border2:rgba(255,255,255,0.11);--border3:rgba(255,255,255,0.17);
  --text:#EAE8DE;--text2:#6E6E68;--text3:#2E2E30;--text4:#A0A09A;
  --accent:#FF5A1F;--accent2:#FF7A45;--accent-dim:rgba(255,90,31,0.12);--accent-glow:rgba(255,90,31,0.22);
  --green:#2DD88A;--green-dim:rgba(45,216,138,0.08);--green-b:rgba(45,216,138,0.2);
  --amber:#F5A623;--amber-dim:rgba(245,166,35,0.09);--amber-b:rgba(245,166,35,0.22);
  --red:#EF4545;--red-dim:rgba(239,69,69,0.09);--red-b:rgba(239,69,69,0.22);
  --blue:#5B9CF4;--blue-dim:rgba(91,156,244,0.09);--blue-b:rgba(91,156,244,0.22);
  --fd:'Barlow Condensed',sans-serif;--fu:'Syne',sans-serif;--fm:'DM Mono',monospace;
  --r:7px;--rl:12px;--rxl:18px;
}
body{background:var(--bg);color:var(--text);font-family:var(--fu);min-height:100vh;overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:var(--fu);outline:none}
input,select,textarea{font-family:var(--fu);outline:none}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--border2)}

/* ── UTILS ──────────────────────────── */
.eyebrow{font-family:var(--fm);font-size:10px;letter-spacing:.14em;color:var(--accent);margin-bottom:12px;text-transform:uppercase}
.sec-title{font-family:var(--fd);font-size:clamp(42px,7vw,80px);font-weight:900;line-height:.88;letter-spacing:.01em;margin-bottom:1rem}
.sec-sub{font-size:14px;color:var(--text2);line-height:1.7;max-width:460px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 20px;border-radius:var(--r);font-family:var(--fu);font-size:13px;font-weight:600;border:none;transition:all .18s;white-space:nowrap;letter-spacing:.01em}
.btn-ghost{background:transparent;color:var(--text4);border:1px solid var(--border2)}
.btn-ghost:hover{border-color:var(--border3);color:var(--text)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 6px 24px var(--accent-glow)}
.btn-surface{background:var(--surface2);color:var(--text4);border:1px solid var(--border)}
.btn-surface:hover{background:var(--surface3);color:var(--text)}
.btn-lg{padding:13px 30px;font-size:15px}
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-family:var(--fm);font-size:10px;font-weight:500;letter-spacing:.04em}
.tag-g{background:var(--green-dim);color:var(--green);border:1px solid var(--green-b)}
.tag-a{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-b)}
.tag-r{background:var(--red-dim);color:var(--red);border:1px solid var(--red-b)}
.tag-b{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-b)}
.tag-o{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(255,90,31,.25)}
.pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulseAnim 2s infinite;flex-shrink:0}
@keyframes pulseAnim{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.75)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── NAV ────────────────────────────── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:56px;display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(1rem,4vw,2.5rem);
  background:rgba(7,7,10,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-mark{width:28px;height:28px;position:relative;flex-shrink:0}
.logo-mark svg{width:28px;height:28px}
.logo-text{font-family:var(--fd);font-size:20px;font-weight:900;letter-spacing:.07em;color:var(--text)}
.logo-text span{color:var(--accent)}
.nav-center{display:flex;gap:28px}
.nav-center a{font-size:13px;color:var(--text2);letter-spacing:.02em;transition:color .15s;padding:4px 0;position:relative}
.nav-center a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:var(--accent);transition:width .2s}
.nav-center a:hover{color:var(--text)}
.nav-center a:hover::after{width:100%}
.nav-right{display:flex;align-items:center;gap:8px}
.hbg{display:none;flex-direction:column;gap:5px;padding:7px;background:none;border:none}
.hbg span{display:block;width:20px;height:1.5px;background:var(--text);border-radius:2px;transition:all .3s}
.hbg.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.hbg.open span:nth-child(2){opacity:0}
.hbg.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}

/* ── MOB NAV ────────────────────────── */
.mob-drawer{
  position:fixed;inset:0;z-index:99;background:var(--bg);
  transform:translateX(100%);transition:transform .35s cubic-bezier(.19,1,.22,1);
  display:flex;flex-direction:column;padding:80px 1.5rem 2rem;gap:0;
}
.mob-drawer.open{transform:translateX(0)}
.mob-drawer a{font-family:var(--fd);font-size:30px;font-weight:900;color:var(--text);
  padding:12px 0;border-bottom:1px solid var(--border);letter-spacing:.04em;display:block}
.mob-drawer-btns{display:flex;flex-direction:column;gap:10px;margin-top:1.5rem}

/* ── HERO ───────────────────────────── */
#hero{
  position:relative;min-height:100vh;display:flex;align-items:center;
  padding:80px clamp(1rem,4vw,2.5rem) 5rem;overflow:hidden;
}
.hero-bg{
  position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 65% 55% at 65% 35%, rgba(255,90,31,.075) 0%, transparent 65%),
    radial-gradient(ellipse 40% 40% at 20% 80%, rgba(255,90,31,.035) 0%, transparent 60%);
}
.hero-grid{
  position:absolute;inset:0;z-index:0;
  background:
    repeating-linear-gradient(90deg, rgba(255,255,255,.012) 0px, transparent 1px, transparent 80px),
    repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0px, transparent 1px, transparent 80px);
  mask-image:linear-gradient(180deg, transparent 0%, black 20%, black 70%, transparent 100%);
}
.scanline{
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent 0%, rgba(255,90,31,.5) 50%, transparent 100%);
  animation:scanAnim 6s ease-in-out infinite;z-index:0;
}
@keyframes scanAnim{0%,100%{top:0%;opacity:0}5%{opacity:1}90%{opacity:.6}95%{top:100%;opacity:0}}
.hero-inner{position:relative;z-index:1;max-width:100%}
.hero-pill{
  display:inline-flex;align-items:center;gap:8px;padding:5px 14px;
  border-radius:99px;background:var(--surface);border:1px solid var(--border2);
  font-family:var(--fm);font-size:11px;color:var(--text2);margin-bottom:2.5rem;
  animation:fadeUp .55s ease both;
}
.hero-h1{
  font-family:var(--fd);
  font-size:clamp(80px,15vw,172px);
  font-weight:900;line-height:.84;letter-spacing:-.01em;
  margin-bottom:2.5rem;
  animation:fadeUp .55s .08s ease both;
}
.hero-h1 em{font-style:normal;color:var(--accent)}
.hero-h1 .outline{
  -webkit-text-stroke:2px var(--text);color:transparent;
  transition:color .3s,-webkit-text-stroke-color .3s;
}
.hero-sub{
  font-size:clamp(14px,1.8vw,17px);color:var(--text2);line-height:1.7;
  max-width:520px;margin-bottom:3rem;
  animation:fadeUp .55s .16s ease both;
}
.hero-ctas{display:flex;gap:10px;flex-wrap:wrap;animation:fadeUp .55s .24s ease both}
.hero-stats{
  display:flex;gap:clamp(1.5rem,4vw,3.5rem);flex-wrap:wrap;
  padding-top:3rem;margin-top:3.5rem;border-top:1px solid var(--border);
  animation:fadeUp .55s .36s ease both;
}
.hs-n{font-family:var(--fd);font-size:clamp(34px,5vw,48px);font-weight:900;line-height:1}
.hs-l{font-family:var(--fm);font-size:10px;color:var(--text2);margin-top:5px;letter-spacing:.08em}

/* ── FEATURES GRID ──────────────────── */
#features{padding:7rem clamp(1rem,4vw,2.5rem);background:var(--bg2)}
.feat-layout{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start;margin-bottom:4rem}
.feat-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:1px;
  background:var(--border);border-radius:var(--rxl);overflow:hidden;
  border:1px solid var(--border);
}
.feat-card{
  background:var(--bg2);padding:1.8rem 1.5rem;
  display:flex;flex-direction:column;gap:.9rem;
  transition:background .2s;cursor:default;
}
.feat-card:hover{background:var(--bg3)}
.feat-ic{
  width:38px;height:38px;border-radius:var(--r);
  background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:17px;
}
.feat-nm{font-family:var(--fd);font-size:19px;font-weight:800;letter-spacing:.02em;line-height:1.1}
.feat-ds{font-size:12px;color:var(--text2);line-height:1.65;flex:1}
.feat-tg{font-family:var(--fm);font-size:9px;color:var(--text3);letter-spacing:.07em}

/* ── HIVE MIND ──────────────────────── */
#hivemind{padding:7rem clamp(1rem,4vw,2.5rem)}
.section-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:3rem;flex-wrap:wrap;gap:1.5rem}
.hive-app{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--rxl);
  overflow:hidden;display:grid;grid-template-columns:240px 1fr 200px;
  min-height:640px;box-shadow:0 40px 80px rgba(0,0,0,.5),0 0 0 1px var(--border);
}
/* sidebar */
.h-sb{background:var(--bg3);border-right:1px solid var(--border);display:flex;flex-direction:column}
.h-sb-top{padding:12px;border-bottom:1px solid var(--border);flex-shrink:0}
.h-search{
  width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;
  padding:7px 10px;font-family:var(--fm);font-size:12px;color:var(--text);
  transition:border-color .15s;
}
.h-search::placeholder{color:var(--text3)}
.h-search:focus{border-color:var(--accent)}
.h-filters{display:flex;gap:4px;margin-top:8px}
.hf{flex:1;padding:4px 3px;border-radius:5px;font-family:var(--fm);font-size:9px;
  letter-spacing:.04em;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .13s}
.hf:hover{border-color:var(--border3);color:var(--text)}
.hf.act{background:var(--accent);color:#fff;border-color:var(--accent)}
.hf.act-g{background:var(--green);color:#000;border-color:var(--green)}
.hf.act-a{background:var(--amber);color:#000;border-color:var(--amber)}
.hf.act-r{background:var(--red);color:#fff;border-color:var(--red)}
.h-list{flex:1;overflow-y:auto}
.t-row{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  cursor:pointer;border-bottom:1px solid var(--border);
  border-left:2px solid transparent;transition:all .13s;
}
.t-row:hover{background:var(--surface)}
.t-row.sel{background:var(--surface);border-left-color:var(--accent)}
.t-num{font-family:var(--fd);font-size:16px;font-weight:800;line-height:1}
.t-nm{font-size:10px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
.t-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-left:auto}
.t-dot.O{background:var(--green)} .t-dot.M{background:var(--amber)} .t-dot.B{background:var(--red)}
/* main panel */
.h-main{overflow-y:auto;display:flex;flex-direction:column}
.h-team-hdr{padding:18px 18px 0;flex-shrink:0}
.h-team-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.big-n{font-family:var(--fd);font-size:52px;font-weight:900;line-height:1}
.t-info{flex:1;min-width:0}
.t-name-lg{font-size:16px;font-weight:600;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badges-row{display:flex;gap:5px;flex-wrap:wrap}
.stat4{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.sc{background:var(--surface);padding:9px 11px}
.sv{font-family:var(--fm);font-size:13px;font-weight:500}
.sl{font-family:var(--fm);font-size:9px;color:var(--text2);margin-top:2px;letter-spacing:.06em}
.h-tabs{display:flex;border-bottom:1px solid var(--border)}
.htab{padding:8px 15px;font-size:11px;color
